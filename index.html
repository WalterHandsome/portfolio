    <title>个人简历</title>
    <style>
        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, "Noto Sans SC", "Microsoft YaHei", sans-serif;
        }

        /* ========== 设计令牌：浅色模式 ========== */
        :root {
            --primary: #165DFF;
            --primary-light: #4080FF;
            --primary-gradient: linear-gradient(135deg, #165DFF 0%, #4080FF 100%);
            --secondary: #36CFC9;
            --text-primary: #1D2129;
            --text-secondary: #4E5969;
            --text-tertiary: #86909C;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F7F8FA;
            --bg-tertiary: #E5E6EB;
            --card-bg: #FFFFFF;
            --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --card-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
            --border-color: #E5E6EB;
            --badge-bg: #E8F3FF;
            --badge-text: #165DFF;
            --progress-bg: #E5E6EB;
            --transition: all 0.25s ease;
        }

        /* ========== 设计令牌：深色模式 ========== */
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #4080FF;
                --primary-light: #699DFF;
                --primary-gradient: linear-gradient(135deg, #4080FF 0%, #699DFF 100%);
                --text-primary: #F7F8FA;
                --text-secondary: #C9CDD4;
                --text-tertiary: #86909C;
                --bg-primary: #17191E;
                --bg-secondary: #232529;
                --bg-tertiary: #2E3035;
                --card-bg: #232529;
                --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
                --card-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.4);
                --border-color: #2E3035;
                --badge-bg: #1A3366;
                --badge-text: #699DFF;
                --progress-bg: #2E3035;
            }
        }

        /* ========== 减少动效 ========== */
        @media (prefers-reduced-motion: reduce) {
            :root { --transition: none; }
            * { animation: none !important; transition: none !important; }
        }

        html { scroll-behavior: smooth; scroll-padding-top: 80px; }

        body {
            color: var(--text-primary);
            background: var(--bg-primary);
            line-height: 1.6;
            font-size: 16px;
        }

        /* ========== 通用组件 ========== */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

        .section {
            margin: 56px 0;
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .section.visible { opacity: 1; transform: translateY(0); }

        .section-title {
            font-size: 22px; font-weight: 700; margin-bottom: 28px;
            padding-left: 14px; position: relative;
        }
        .section-title::before {
            content: ''; position: absolute; left: 0; top: 50%;
            transform: translateY(-50%); width: 4px; height: 22px;
            background: var(--primary-gradient); border-radius: 2px;
        }

        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px; background: var(--primary-gradient);
            color: #fff; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: var(--transition); text-decoration: none;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(22,93,255,0.35); }

        .btn-outline {
            background: transparent; color: var(--primary); border: 1px solid var(--primary);
        }
        .btn-outline:hover { background: var(--badge-bg); box-shadow: none; transform: none; }

        .badge {
            display: inline-block; padding: 4px 12px; background: var(--badge-bg);
            color: var(--badge-text); border-radius: 20px; font-size: 12px;
            font-weight: 500; margin: 0 6px 8px 0; white-space: nowrap;
        }

        .card {
            background: var(--card-bg); border-radius: 12px;
            box-shadow: var(--card-shadow); padding: 22px;
            transition: var(--transition); border: 1px solid var(--border-color);
        }
        .card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow-hover); }

        /* ========== Tab 组件 ========== */
        .tab-list {
            display: flex; gap: 2px; background: var(--bg-secondary);
            border-radius: 8px; overflow-x: auto; scrollbar-width: none;
            margin-bottom: 20px;
        }
        .tab-list::-webkit-scrollbar { display: none; }

        .tab {
            flex: 1; min-width: 80px; padding: 12px 16px; text-align: center;
            font-size: 14px; font-weight: 500; color: var(--text-secondary);
            background: transparent; border: none; cursor: pointer;
            transition: var(--transition); white-space: nowrap;
        }
        .tab[aria-selected="true"] {
            color: var(--primary); background: var(--card-bg);
            box-shadow: 0 -2px 0 var(--primary) inset;
        }

        .tab-panel { display: none; animation: fadeIn 0.25s ease; }
        .tab-panel[aria-hidden="false"] { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ========== 进度条 ========== */
        .progress-wrap {
            width: 100%; height: 8px; background: var(--progress-bg);
            border-radius: 4px; overflow: hidden; margin: 8px 0;
        }
        .progress-bar {
            height: 100%; background: var(--primary-gradient);
            border-radius: 4px; transition: width 0.6s ease;
        }

        /* ========== 导航栏 ========== */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
            transform: translateY(-100%);
        }
        .navbar.visible { transform: translateY(0); }
        @media (prefers-color-scheme: dark) {
            .navbar { background: rgba(23,25,30,0.88); }
        }
        [data-theme="dark"] .navbar { background: rgba(23,25,30,0.88); }
        [data-theme="light"] .navbar { background: rgba(255,255,255,0.85); }

        .navbar-inner {
            max-width: 1100px; margin: 0 auto; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            height: 52px;
        }
        .navbar-brand {
            font-size: 15px; font-weight: 600; color: var(--primary);
            text-decoration: none;
        }
        .navbar-links {
            display: flex; gap: 4px; list-style: none;
            overflow-x: auto; scrollbar-width: none;
        }
        .navbar-links::-webkit-scrollbar { display: none; }
        .navbar-links a {
            display: block; padding: 6px 14px; font-size: 13px;
            color: var(--text-secondary); text-decoration: none;
            border-radius: 6px; transition: var(--transition); white-space: nowrap;
        }
        .navbar-links a:hover, .navbar-links a.active {
            color: var(--primary); background: var(--badge-bg);
        }
        .navbar-actions { display: flex; gap: 8px; align-items: center; }

        /* 主题切换按钮 */
        .theme-toggle {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); font-size: 16px;
        }
        .theme-toggle:hover { color: var(--primary); background: var(--badge-bg); }

        /* ========== 固定按钮 ========== */
        .fixed-buttons {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 12px; z-index: 999;
        }
        .fixed-btn {
            width: 46px; height: 46px; border-radius: 50%;
            background: var(--card-bg); box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color); color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition);
            opacity: 0; pointer-events: none;
        }
        .fixed-btn.visible { opacity: 1; pointer-events: all; }
        .fixed-btn:hover {
            background: var(--primary-gradient); color: #fff;
            transform: translateY(-2px);
        }

        /* ========== Hero 区域 ========== */
        .hero {
            padding: 80px 0 60px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: -80px; right: -80px;
            width: 320px; height: 320px; background: var(--primary-gradient);
            opacity: 0.06; border-radius: 50%; z-index: 0;
        }
        .hero::after {
            content: ''; position: absolute; bottom: -60px; left: -60px;
            width: 200px; height: 200px; background: var(--secondary);
            opacity: 0.04; border-radius: 50%; z-index: 0;
        }
        .hero-content {
            position: relative; z-index: 1;
            display: grid; grid-template-columns: 3fr 2fr;
            gap: 40px; align-items: center;
        }
        .hero-text h1 {
            font-size: 32px; font-weight: 700; margin-bottom: 14px; color: var(--primary);
        }
        .hero-text p {
            font-size: 15px; color: var(--text-secondary);
            margin-bottom: 20px; max-width: 560px; line-height: 1.7;
        }
        .hero-badges { margin-bottom: 20px; display: flex; flex-wrap: wrap; }
        .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }

        .hero-contact {
            background: var(--card-bg); border-radius: 12px;
            box-shadow: var(--card-shadow); padding: 24px;
            border: 1px solid var(--border-color);
        }
        .contact-item {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 14px; font-size: 14px; color: var(--text-secondary);
        }
        .contact-item:last-child { margin-bottom: 0; }
        .contact-item svg { width: 20px; height: 20px; color: var(--primary); flex-shrink: 0; }
        .contact-item a { color: var(--primary); text-decoration: none; }
        .contact-item a:hover { text-decoration: underline; }

        /* ========== 核心成果 ========== */
        .achievements {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
        }
        .achievement-card { text-align: center; padding: 28px 16px; }
        .achievement-card .number {
            font-size: 36px; font-weight: 700; color: var(--primary); margin-bottom: 8px;
        }
        .achievement-card .desc {
            font-size: 14px; color: var(--text-secondary); line-height: 1.5;
        }

        /* ========== 经历 ========== */
        .exp-item {
            margin-bottom: 24px; padding-bottom: 24px;
            border-bottom: 1px dashed var(--border-color);
        }
        .exp-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .exp-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
        }
        .exp-company { font-size: 17px; font-weight: 600; }
        .exp-time {
            font-size: 13px; color: var(--text-tertiary);
            background: var(--bg-secondary); padding: 2px 10px; border-radius: 4px;
        }
        .exp-position { font-size: 14px; color: var(--primary); font-weight: 500; margin-bottom: 10px; }
        .exp-points { list-style: none; }
        .exp-points li {
            position: relative; padding-left: 18px; margin-bottom: 6px;
            font-size: 14px; color: var(--text-secondary);
        }
        .exp-points li::before {
            content: '•'; position: absolute; left: 0; color: var(--primary); font-weight: 700;
        }

        /* ========== 项目 ========== */
        .projects { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .project-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
        .project-tech { margin-bottom: 10px; }
        .project-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.6; }
        .project-result {
            font-size: 13px; color: var(--primary); font-weight: 500;
            margin-bottom: 14px; padding-left: 18px; position: relative;
        }
        .project-result::before { content: '✓'; position: absolute; left: 0; }

        /* ========== 技能矩阵 ========== */
        .skills { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; }
        .skill-category {
            background: var(--card-bg); border-radius: 12px; padding: 20px;
            border: 1px solid var(--border-color);
        }
        .skill-cat-title {
            font-size: 16px; font-weight: 600; margin-bottom: 16px;
            padding-bottom: 8px; border-bottom: 1px solid var(--border-color);
        }
        .skill-item { margin-bottom: 14px; }
        .skill-item:last-child { margin-bottom: 0; }
        .skill-name {
            font-size: 14px; color: var(--text-secondary);
            display: flex; justify-content: space-between;
        }

        /* ========== 教育 & 证书 ========== */
        .edu-cert { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .edu-school { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .edu-major { font-size: 14px; color: var(--primary); margin-bottom: 4px; }
        .edu-time { font-size: 12px; color: var(--text-tertiary); margin-bottom: 10px; }
        .edu-achieve { list-style: none; }
        .edu-achieve li {
            position: relative; padding-left: 16px; margin-bottom: 4px;
            font-size: 14px; color: var(--text-secondary);
        }
        .edu-achieve li::before {
            content: '—'; position: absolute; left: 0; color: var(--text-tertiary);
        }
        .cert-badges { display: flex; flex-wrap: wrap; gap: 8px; }

        /* ========== 页脚 ========== */
        footer {
            text-align: center; padding: 24px 0; font-size: 14px;
            color: var(--text-tertiary); border-top: 1px solid var(--border-color); margin-top: 40px;
        }

        /* ========== 手动主题切换覆盖 ========== */
        [data-theme="dark"] {
            --primary: #4080FF; --primary-light: #699DFF;
            --primary-gradient: linear-gradient(135deg, #4080FF 0%, #699DFF 100%);
            --text-primary: #F7F8FA; --text-secondary: #C9CDD4; --text-tertiary: #86909C;
            --bg-primary: #17191E; --bg-secondary: #232529; --bg-tertiary: #2E3035;
            --card-bg: #232529;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.3);
            --card-shadow-hover: 0 8px 24px rgba(0,0,0,0.4);
            --border-color: #2E3035; --badge-bg: #1A3366; --badge-text: #699DFF;
            --progress-bg: #2E3035;
        }
        [data-theme="light"] {
            --primary: #165DFF; --primary-light: #4080FF;
            --primary-gradient: linear-gradient(135deg, #165DFF 0%, #4080FF 100%);
            --text-primary: #1D2129; --text-secondary: #4E5969; --text-tertiary: #86909C;
            --bg-primary: #FFFFFF; --bg-secondary: #F7F8FA; --bg-tertiary: #E5E6EB;
            --card-bg: #FFFFFF;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
            --card-shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
            --border-color: #E5E6EB; --badge-bg: #E8F3FF; --badge-text: #165DFF;
            --progress-bg: #E5E6EB;
        }

        /* ========== 打印样式 ========== */
        @media print {
            body { background: #fff; color: #000; }
            :root { --text-primary: #000; --text-secondary: #333; --card-bg: #fff; --border-color: #ddd; }
            .fixed-buttons { display: none !important; }
            .hero-actions { display: none !important; }
            .navbar { display: none !important; }
            .section { opacity: 1; transform: none; margin: 24px 0; }
            .card, .skill-category { box-shadow: none !important; border: 1px solid #ddd !important; page-break-inside: avoid; }
            .tab-panel { display: block !important; }
            .tab-list { display: none !important; }
            .hero { background: #fff !important; }
            .hero::before { display: none !important; }
            .badge { background: #eee !important; color: #333 !important; }
            .progress-bar { background: #666 !important; }
            @page { margin: 1.5cm; }
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .hero-content { grid-template-columns: 1fr; gap: 24px; }
            .hero { padding: 60px 0 40px; }
            .hero-text h1 { font-size: 26px; }
            .section { margin: 40px 0; }
            .achievements, .projects, .skills, .edu-cert { grid-template-columns: 1fr; }
            .fixed-buttons { bottom: 20px; right: 16px; }
            .fixed-btn { width: 40px; height: 40px; }
            .navbar-links { display: none; }
        }
        @media (max-width: 480px) {
            body { font-size: 14px; }
            .section-title { font-size: 20px; }
            .hero-text h1 { font-size: 22px; }
            .card, .skill-category, .hero-contact { padding: 16px; }
            .exp-header { flex-direction: column; gap: 4px; }
        }
    </style>
</head>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">

    <!-- 固定按钮：打印 & 回到顶部 -->

                    </button>

    <div class="container">

        <p>

    /* ---------- 通用 Tab 渲染 ---------- */
    function renderTabbedSection(prefix, groups, renderFn) {
        const tabList = document.getElementById(`${prefix}TabList`);
        const panels = document.getElementById(`${prefix}Panels`);

        groups.forEach((g, i) => {
            const btn = document.createElement('button');
            btn.className = 'tab'; btn.role = 'tab';
            btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
            btn.setAttribute('aria-controls', `${prefix}-panel-${i}`);
            btn.textContent = g.tabName;
            tabList.appendChild(btn);

            const panel = document.createElement('div');
            panel.className = 'tab-panel'; panel.role = 'tabpanel';
            panel.id = `${prefix}-panel-${i}`;
            panel.setAttribute('aria-hidden', i === 0 ? 'false' : 'true');
            panel.innerHTML = renderFn(g.items);
            panels.appendChild(panel);
        });

        initTabs(tabList);
    }

    /* ---------- Tab 交互 ---------- */
    function initTabs(tabList) {
        const tabs = tabList.querySelectorAll('.tab');
        const parent = tabList.parentElement;
        const panels = parent.querySelectorAll('.tab-panel');

        tabs.forEach((tab, i) => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
                tab.setAttribute('aria-selected', 'true');
                panels.forEach(p => p.setAttribute('aria-hidden', 'true'));
                panels[i].setAttribute('aria-hidden', 'false');
            });
            tab.addEventListener('keydown', e => {
                let ni;
                if (e.key === 'ArrowRight') ni = (i + 1) % tabs.length;
                else if (e.key === 'ArrowLeft') ni = (i - 1 + tabs.length) % tabs.length;
                else return;
                tabs[ni].focus(); tabs[ni].click();
            });
        });
    }

    /* ---------- 滚动淡入 ---------- */
    function initScrollObserver() {
        let numbersAnimated = false;
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    // 核心成果区域进入视口时触发数字动画（只触发一次）
                    if (!numbersAnimated && e.target.id === 'achievementsSection') {
                        numbersAnimated = true;
                        animateNumbers();
                    }
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.section').forEach(s => observer.observe(s));
    }

        [document.getElementById('printBtn'), document.getElementById('printBtnHero')].forEach(b => {
            b.addEventListener('click', () => window.print());
        });
    }

    /* ---------- 主题切换 ---------- */
    function initTheme() {
        const toggle = document.getElementById('themeToggle');
        const saved = localStorage.getItem('resume-theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
            toggle.textContent = saved === 'dark' ? '☀️' : '🌙';
        }
        toggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const isDark = current === 'dark' ||
                (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
            const next = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('resume-theme', next);
            toggle.textContent = next === 'dark' ? '☀️' : '🌙';
        });
    }

    /* ---------- 导航栏：滚动显示 + 高亮当前区域 ---------- */
    function initNavbar() {
        const navbar = document.getElementById('navbar');
        const links = document.querySelectorAll('#navLinks a');
        const sections = Array.from(links).map(a => document.querySelector(a.getAttribute('href'))).filter(Boolean);

        // 滚动超过 Hero 区域后显示导航栏
        const hero = document.querySelector('.hero');
        const showNav = () => {
            navbar.classList.toggle('visible', window.scrollY > hero.offsetHeight - 60);
        };
        window.addEventListener('scroll', showNav, { passive: true });
        showNav();

        // 滚动高亮当前区域
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    links.forEach(l => l.classList.remove('active'));
                    const active = document.querySelector(`#navLinks a[href="#${entry.target.id}"]`);
                    if (active) active.classList.add('active');
                }
            });
        }, { rootMargin: '-30% 0px -60% 0px' });
        sections.forEach(s => observer.observe(s));
    }

    /* ---------- 数字计数动画 ---------- */
    function animateNumbers() {
        document.querySelectorAll('.achievement-card .number').forEach(el => {
            const text = el.textContent;
            // 提取数字部分和非数字后缀（如 "50+" → 50, "+"）
            const match = text.match(/^([\d.]+)(.*)$/);
            if (!match) return;
            const target = parseFloat(match[1]);
            const suffix = match[2];
            const isFloat = text.includes('.');
            const duration = 1200;
            const start = performance.now();

            el.textContent = '0' + suffix;
            const step = (now) => {
                const progress = Math.min((now - start) / duration, 1);
                // easeOutExpo 缓动
                const ease = 1 - Math.pow(2, -10 * progress);
                const current = target * ease;
                el.textContent = (isFloat ? current.toFixed(1) : Math.floor(current)) + suffix;
                if (progress < 1) requestAnimationFrame(step);
                else el.textContent = text; // 确保最终值精确
            };
            requestAnimationFrame(step);
        });
    }
